{% extends "base.html" %}

{% block page_title %}
Register
{% endblock %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1>CareerPilot AI</h1>

        <p>Create your free account.</p>

        <form method="POST">

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Email Address"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">

                Register

            </button>

        </form>

        <div class="auth-link">

            Already have an account?

            <a href="/login">

                Login

            </a>

        </div>

    </div>

</div>

{% endblock %}
