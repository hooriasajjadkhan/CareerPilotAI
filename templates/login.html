{% extends "base.html" %}

{% block page_title %}
Login
{% endblock %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1>CareerPilot AI</h1>

        <p>Welcome back! Sign in to continue.</p>

        <form method="POST">

            <input type="email"
                   name="email"
                   placeholder="Email Address"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="auth-link">

            Don't have an account?

            <a href="/register">

                Create Account

            </a>

        </div>

    </div>

</div>

{% endblock %}
